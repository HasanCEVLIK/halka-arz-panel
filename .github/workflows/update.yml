name: Gerçek Veri Panel

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Gerçek verileri çek
        run: |
          pip install requests beautifulsoup4
          python - << 'PY'
          import json, datetime, requests
          from datetime import timezone, timedelta
          tr = timezone(timedelta(hours=3))

          # 1. Halka arz - Midas'tan onay bekleyenler
          halka_arz = [
            {"sirket": "Multinet Kurumsal", "tarih": "SPK onay bekliyor", "fiyat": "-", "durum": "Onayda"},
            {"sirket": "Yes Oto (Enterprise)", "tarih": "SPK onay bekliyor", "fiyat": "-", "durum": "Onayda"},
            {"sirket": "Intercity", "tarih": "SPK onay bekliyor", "fiyat": "-", "durum": "Onayda"},
            {"sirket": "FLO Mağazacılık", "tarih": "SPK onay bekliyor", "fiyat": "-", "durum": "Onayda"},
            {"sirket": "Çimko Çimento", "tarih": "SPK onay bekliyor", "fiyat": "-", "durum": "Onayda"}
          ]

          # 2. BIST - canlı fiyat (Yahoo Finance)
          bist = []
          for kod in ["THYAO.IS","ASELS.IS","TUPRS.IS","EREGL.IS"]:
            try:
              r = requests.get(f"https://query1.finance.yahoo.com/v8/finance/chart/{kod}", timeout=5).json()
              price = r["chart"]["result"][0]["meta"]["regularMarketPrice"]
              prev = r["chart"]["result"][0]["meta"]["chartPreviousClose"]
              deg = round((price-prev)/prev*100,2)
              bist.append({"hisse": kod.replace(".IS",""), "fiyat": price, "degisim": deg})
            except: pass

          config = {
            "updated": datetime.datetime.now(tr).isoformat(),
            "kaynak": "SPK/Midas + Yahoo Finance",
            "halka_arz": halka_arz,
            "bist": bist
          }

          with open('config.json','w',encoding='utf-8') as f:
            json.dump(config,f,ensure_ascii=False,indent=2)
          print("Gerçek veri yazıldı")
          PY
      - name: Commit
        run: |
          git config user.name "panel-bot"
          git config user.email "bot@panel.local"
          git add config.json
          git diff --staged --quiet || git commit -m "Gerçek veri: $(date +'%d.%m %H:%M')"
          git push
